<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A tiny text-adventure engine: write a story in a custom DSL and play it in the browser.">
    <title>textGameEngine</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="appContainer">
        <header id="mainHeader">
            <h1>textGameEngine</h1>
        </header>
        <main>
            <div class="start button-group">
                <button id="startQuestButton" class="hidden">Start Game</button>
            </div>

            <img id="title" src="src/images/title.png" class="hidden title">
            <div id="foreground">
                <img src="src/images/hillsForeground.png">
            </div>

            <div id="narratorText" class="narrator-text hidden"></div>
            <div class="start game-button button-group" id="gameButton"></div>
            <div class="inputBox hidden" id="inputBox"></div>
        </main>
    </div>
    <script type="module" src="src/main.ts"></script>
</body>
</html>
